<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Add result</h1>

        <p><a href="{{ url_for('index') }}">Back to results</a></p>

        {% if message %}
            <p class="message">{{ message }}</p>
        {% endif %}

        <form method="POST" class="simple-form">
            <div class="form-group">
                <label for="swimmer_id">Swimmer</label>
                <select id="swimmer_id" name="swimmer_id" required>
                    <option value="">Select swimmer</option>
                    {% for swimmer in swimmers %}
                        <option value="{{ swimmer.id }}">{{ swimmer.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="stroke">Stroke</label>
                <select id="stroke" name="stroke" required>
                    <option value="">Select stroke</option>
                    {% for stroke in strokes %}
                        <option value="{{ stroke }}">{{ stroke }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="pool_length">Pool length</label>
                <select id="pool_length" name="pool_length" required>
                    <option value="">Select pool length</option>
                    {% for length in pool_lengths %}
                        <option value="{{ length }}">{{ length }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="equipment">Equipment</label>
                <select id="equipment" name="equipment" required>
                    <option value="">Select equipment</option>
                    {% for equipment in equipment_options %}
                        <option value="{{ equipment }}">{{ equipment }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="failed_start_time">Failed start time (s)</label>
                <input type="number" id="failed_start_time" name="failed_start_time" min="1" required>
            </div>

            <button type="submit">Add result</button>
        </form>
    </div>
</body>
</html>
