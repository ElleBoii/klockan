<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bekräfta simmare</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Bekräfta simmare</h1>

        <p>Bekräfta att dessa namn ska läggas till.</p>

        <ul class="name-list">
            {% for name in pending_swimmers %}
                <li class="name-list-item">
                    <span>{{ name }}</span>
                </li>
            {% endfor %}
        </ul>

        <div class="button-row">
            <a class="secondary-button" href="{{ url_for('add_swimmers') }}">Tillbaka</a>

            <form method="POST" action="{{ url_for('save_confirmed_swimmers') }}">
                <button type="submit">Bekräfta</button>
            </form>
        </div>
    </div>
</body>
</html>
